<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Blog Tech</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background-color:#f5faff;
    text-align:center;
}

/* Cabeçalho */
header{
    background:linear-gradient(135deg,#0066cc,#0099ff);
    color:white;
    padding:40px 20px;
}

header h1{
    font-size:48px;
    margin-bottom:10px;
}

header p{
    font-size:20px;
}
.logo{
    margin:40px auto;
}

.logo img{
    width:400px;
    max-width:90%;
}
.post{
    max-width:800px;
    margin:0 auto 50px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.post h2{
    color:#0066cc;
    font-size:36px;
    margin-bottom:15px;
}

.autor{
    color:#666;
    font-size:18px;
    margin-bottom:20px;
}

.texto{
    font-size:20px;
    line-height:1.6;
}

</style>
</head>
<body>

<header>
    <h1>Meu blog tech</h1>
    <p>vou compartilhar conhecimentos sobre tecnologia e programação</p>
</header>
<div class="post">
    <h2>Meu primeiro post</h2>

    <p class="autor">Por: Isadora Maciel</p>

    <p class="texto">
        Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação
        e curiosidades na área de tecnologia.
    </p>
</div>

</body>
</html>
