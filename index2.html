<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Blog Tech</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background-color:#f5faff;
    text-align:center;
}
header{
    background:linear-gradient(135deg,#0066cc,#0099ff);
    color:white;
    padding:40px 20px;
}

header h1{
    font-size:48px;
    margin-bottom:10px;
}

header p{
    font-size:20px;
}
.logo{
    margin:40px auto;
}

.logo img{
    width:400px;
    max-width:90%;
}
.post{
    max-width:800px;
    margin:0 auto 50px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.post h2{
    color:#0066cc;
    font-size:36px;
    margin-bottom:15px;
}

.autor{
    color:#666;
    font-size:18px;
    margin-bottom:20px;
}

.texto{
    font-size:20px;
    line-height:1.6;
}
.reacoes {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.btn-reacao {
    font-size: 18px;
    padding: 10px 20px;
    border: 2px solid #0066cc;
    border-radius: 25px;
    background-color: white;
    color: #0066cc;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.btn-reacao:hover {
    background-color: #f0f7ff;
    transform: scale(1.05);
}

.btn-reacao:disabled {
    background-color: #e0e0e0;
    border-color: #b0b0b0;
    color: #666;
    cursor: not-allowed;
    transform: none;
}

</style>
</head>
<body>

<header>
    <h1>Meu blog tech</h1>
    <p>vou compartilhar conhecimentos sobre tecnologia e programação</p>
</header>
<div class="post">
    <h2>Meu primeiro post</h2>

    <p class="autor">Por: Isadora Maciel</p>

    <p class="texto">
        Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação
        e curiosidades na área de tecnologia.
    </p>
</div>
<hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">

    <div class="reacoes">
        <button id="btnLike" class="btn-reacao">
            👍 Curtir (<span id="contLike">0</span>)
        </button>
        
        <button id="btnCoracao" class="btn-reacao">
            ❤️ Amei (<span id="contCoracao">0</span>)
        </button>
    </div>
</div>

<script>
    // Selecionando os elementos do HTML
    const btnLike = document.getElementById('btnLike');
    const btnCoracao = document.getElementById('btnCoracao');
    
    const contLike = document.getElementById('contLike');
    const contCoracao = document.getElementById('contCoracao');

    // Variáveis para simular o banco de dados de contagem
    let qtdLikes = 0;
    let qtdCoracoes = 0;

    // Evento de clique para o botão Curtir
    btnLike.addEventListener('click', function() {
        qtdLikes++; // Aumenta a contagem em 1
        contLike.textContent = qtdLikes; // Atualiza o texto na tela
        btnLike.disabled = true; // Desativa o botão para não clicar de novo
    });

    // Evento de clique para o botão Coração
    btnCoracao.addEventListener('click', function() {
        qtdCoracoes++; // Aumenta a contagem em 1
        contCoracao.textContent = qtdCoracoes; // Atualiza o texto na tela
        btnCoracao.disabled = true; // Desativa o botão para não clicar de novo
    });
</script>
</body>
</html>
